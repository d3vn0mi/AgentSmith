services:
  agentsmith-control:
    image: agentsmith:latest
    build: .
    command: ["python", "-m", "agent_smith", "control-plane"]
    container_name: agentsmith-control
    env_file: .env
    environment:
      - AGENT_IMAGE=agentsmith:latest
      - AGENT_NETWORK=agentsmith_internal
      - DATA_DIR_HOST=${PWD}/data
      - CONFIG_PATH_HOST=${PWD}/config.yaml
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml:ro
    networks:
      - internal
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: agentsmith-caddy
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - internal
    depends_on:
      - agentsmith-control
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: agentsmith-ollama
    profiles: ["local-llm"]
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - internal
    restart: unless-stopped

volumes:
  caddy-data:
  caddy-config:
  ollama-data:

networks:
  internal:
    name: agentsmith_internal
    driver: bridge
